services:
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: "pg"
      DB_HOST: "postgres"
      DB_PORT: 5432
      DB_DATABASE: aidb
      DB_USER: appuser
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_EMAIL: "admin@knowledge-flows.com"
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASS}
      WEBSOCKETS_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: ${DIRECTUS_MEMORY_LIMIT_MB:-512}M
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8055/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  llama:
    image: ollama/ollama:latest
    container_name: ${COMPOSE_PROJECT_NAME}-llama
    ports:
      - "127.0.0.1:${LLAMA_PORT:-5000}:11434"
    volumes:
      - type: bind
        source: ${DATA_DIR}/ollama
        target: /root/.ollama
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - backend

  qr:
    image: uphold/qrcode-reader:latest
    container_name: ${COMPOSE_PROJECT_NAME}-qr
    ports:
      - "127.0.0.1:${QR_PORT:-7000}:80"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/ai-stack.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - directus
      - llama
      - qr
    networks:
      - backend

networks:
  backend:
    driver: bridge
