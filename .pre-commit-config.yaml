repos:
  - repo: local
    hooks:
      - id: shell-syntax
        name: Validate shell script syntax
        entry: bash -n
        language: system
        files: ^(scripts|tests)/.*\.sh$
      - id: compose-config
        name: Validate Docker Compose config
        entry: bash -c 'docker compose --env-file .env.dev config >/dev/null'
        language: system
        pass_filenames: false
        files: ^(docker-compose\.yml|\.env\.dev|nginx/.*\.template)$
      - id: resource-budget
        name: Validate 5GB resource budget
        entry: ./tests/resource-budget-test.sh
        language: system
        pass_filenames: false
        files: ^(docker-compose\.yml|\.env\.dev|\.env\.template|tests/resource-budget-test\.sh)$
